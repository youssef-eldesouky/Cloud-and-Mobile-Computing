version: '3.8'
services:
  redis-node1:
    image: redis:7
    ports:
      - "7001:6379"
    networks:
      - redis-net

  redis-node2:
    image: redis:7
    ports:
      - "7002:6379"
    networks:
      - redis-net

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    command: ["/usr/local/bin/etcd", "--name", "node1", "--initial-advertise-peer-urls", "http://etcd:2380", "--listen-peer-urls", "http://0.0.0.0:2380", "--listen-client-urls", "http://0.0.0.0:2379", "--advertise-client-urls", "http://etcd:2379", "--initial-cluster", "node1=http://etcd:2380", "--initial-cluster-state", "new", "--data-dir", "/etcd-data"]
    ports:
      - "2379:2379"
    networks:
      - redis-net

networks:
  redis-net:
